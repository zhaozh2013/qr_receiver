<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR File Receiver - Compact Protocol / Fast</title>
  <script src="./vendor/pako.min.js"></script>
  <style>
    :root { --bg:#f5f7fb; --panel:#fff; --text:#111827; --muted:#6b7280; --line:#d1d5db; --primary:#111827; --danger:#b91c1c; --ok:#065f46; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1100px; margin:0 auto; padding:20px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px; box-shadow:0 8px 24px rgba(0,0,0,.04); }
    h1 { margin:0 0 12px; font-size:24px; }
    p { margin:8px 0; line-height:1.5; }
    .muted { color:var(--muted); }
    .grid { display:grid; grid-template-columns:420px 1fr; gap:16px; align-items:start; }
    @media (max-width:980px) { .grid { grid-template-columns:1fr; } }
    video { width:100%; max-height:70vh; border-radius:16px; border:1px solid var(--line); background:#000; object-fit:cover; }
    button, select { appearance:none; font-size:14px; }
    button { border:1px solid var(--primary); background:var(--primary); color:#fff; padding:10px 14px; border-radius:10px; cursor:pointer; margin-right:8px; margin-bottom:8px; }
    button.secondary { background:#fff; color:var(--primary); }
    button.danger { border-color:var(--danger); background:var(--danger); }
    button:disabled { opacity:.6; cursor:not-allowed; }
    select { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:#fff; margin-bottom:10px; }
    .status { margin-top:12px; padding:12px; border:1px solid var(--line); border-radius:12px; background:#fafafa; }
    .mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; word-break:break-all; }
    .progressWrap { width:100%; height:14px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin:10px 0; }
    .progressBar { height:100%; width:0%; background:#111827; transition:width .12s linear; }
    .small { font-size:12px; color:var(--muted); }
    .ok { color:var(--ok); }
    .missing { font-size:12px; color:var(--muted); word-break:break-all; max-height:90px; overflow:auto; border-top:1px dashed var(--line); margin-top:10px; padding-top:10px; }
  </style>
</head>
<body>
  <div class="wrap"><div class="card">
    <h1>离线近场二维码收件端（提速版）</h1>
    <p class="muted">优化点：中心区域裁切、固定降采样扫描、UI 节流、chunk 先做轻量判定后再解码。</p>
    <div class="grid">
      <div>
        <label for="cameraSelect">摄像头</label>
        <select id="cameraSelect"></select>
        <div><button id="openCameraBtn">打开摄像头</button><button id="startScanBtn" disabled>开始接收</button><button id="stopScanBtn" class="danger" disabled>停止</button><button id="resetBtn" class="secondary">重置</button></div>
        <div class="status">
          <p><strong>状态：</strong><span id="statusText">请先打开摄像头</span></p>
          <p><strong>扫描引擎：</strong><span id="engineText">-</span></p>
          <p><strong>扫描分辨率：</strong><span id="scanResText">640 × 480（中心裁切）</span></p>
          <p><strong>传输ID：</strong><span id="transferId" class="mono">-</span></p>
          <p><strong>文件：</strong><span id="fileInfo">-</span></p>
          <p><strong>压缩：</strong><span id="compressionInfo">-</span></p>
          <p><strong>接收进度：</strong><span id="progressText">0 / 0</span></p>
          <div class="progressWrap"><div id="progressBar" class="progressBar"></div></div>
          <p><strong>整体校验：</strong><span id="integrityText">-</span></p>
          <p><strong>最后扫码：</strong><span id="lastScanText">-</span></p>
          <div id="missingText" class="missing">缺失分片：-</div>
          <p class="small">让二维码尽量占满取景框中央。识别不稳时，先调大发送端帧间隔，再考虑减小 chunk。</p>
        </div>
      </div>
      <div><video id="video" muted autoplay playsinline></video></div>
    </div>
  </div></div>
  <script>
    (() => {
      const el = { cameraSelect:document.getElementById("cameraSelect"), openCameraBtn:document.getElementById("openCameraBtn"), startScanBtn:document.getElementById("startScanBtn"), stopScanBtn:document.getElementById("stopScanBtn"), resetBtn:document.getElementById("resetBtn"), video:document.getElementById("video"), statusText:document.getElementById("statusText"), engineText:document.getElementById("engineText"), transferId:document.getElementById("transferId"), fileInfo:document.getElementById("fileInfo"), compressionInfo:document.getElementById("compressionInfo"), progressText:document.getElementById("progressText"), progressBar:document.getElementById("progressBar"), integrityText:document.getElementById("integrityText"), lastScanText:document.getElementById("lastScanText"), missingText:document.getElementById("missingText") };
      const SCAN_W=640, SCAN_H=480, CROP_RATIO=0.62, UI_THROTTLE_MS=120, MISSING_THROTTLE_MS=500;
      let stream=null, detector=null, scanLoopActive=false, runId=0;
      const canvas=document.createElement("canvas"), ctx=canvas.getContext("2d", { willReadFrequently:true }); canvas.width=SCAN_W; canvas.height=SCAN_H;
      const state={ session:null, chunks:new Map(), lastPacketFingerprint:"", lastScanAt:0, lastUiAt:0, lastMissingAt:0 };
      const sleep = ms => new Promise(r=>setTimeout(r,ms));
      const b36ToInt = s => parseInt(s,36);
      function formatBytes(n){ if(!Number.isFinite(n)) return "-"; const u=["B","KB","MB","GB"]; let i=0,v=n; while(v>=1024&&i<u.length-1){v/=1024;i++;} return `${v.toFixed(v>=100||i===0?0:1)} ${u[i]}`; }
      function fromBase64Url(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4) s+="="; const bin=atob(s); const out=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i); return out; }
      const base64UrlToText = s => new TextDecoder().decode(fromBase64Url(s));
      function makeCRCTable(){ const t=new Uint32Array(256); for(let i=0;i<256;i++){ let c=i; for(let j=0;j<8;j++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[i]=c>>>0; } return t; }
      const CRC_TABLE = makeCRCTable();
      function crc32(uint8){ let crc=0xFFFFFFFF; for(let i=0;i<uint8.length;i++) crc=CRC_TABLE[(crc^uint8[i])&0xFF]^(crc>>>8); return ((crc^0xFFFFFFFF)>>>0).toString(16).padStart(8,"0"); }
      const updateStatus = text => el.statusText.textContent = text;
      function resetState(keepCamera=true){ state.session=null; state.chunks.clear(); state.lastPacketFingerprint=""; state.lastScanAt=0; state.lastUiAt=0; state.lastMissingAt=0; el.transferId.textContent="-"; el.fileInfo.textContent="-"; el.compressionInfo.textContent="-"; el.progressText.textContent="0 / 0"; el.progressBar.style.width="0%"; el.integrityText.textContent="-"; el.lastScanText.textContent="-"; el.missingText.textContent="缺失分片：-"; updateStatus(keepCamera ? "摄像头已就绪，可以开始接收" : "请先打开摄像头"); }
      function updateProgressUI(force=false){ if(!state.session){ el.progressText.textContent="0 / 0"; el.progressBar.style.width="0%"; el.missingText.textContent="缺失分片：-"; return; } const now=performance.now(), total=state.session.totalChunks, got=state.chunks.size; if(force||now-state.lastUiAt>=UI_THROTTLE_MS){ el.progressText.textContent=`${got} / ${total}`; el.progressBar.style.width=`${total>0?(got/total)*100:0}%`; state.lastUiAt=now; } if(force||now-state.lastMissingAt>=MISSING_THROTTLE_MS){ if(got===total){ el.missingText.textContent="缺失分片：无"; } else { const missing=[]; for(let i=0;i<total;i++){ if(!state.chunks.has(i)) missing.push(i); if(missing.length>=80){ missing.push("..."); break; } } el.missingText.textContent=`缺失分片：${missing.join(", ") || "-"}`; } state.lastMissingAt=now; } }
      async function listCameras(){ try { const devices=await navigator.mediaDevices.enumerateDevices(); const cams=devices.filter(d=>d.kind==="videoinput"); el.cameraSelect.innerHTML=""; cams.forEach((cam,idx)=>{ const opt=document.createElement("option"); opt.value=cam.deviceId; opt.textContent=cam.label || `Camera ${idx+1}`; el.cameraSelect.appendChild(opt); }); if(!cams.length){ const opt=document.createElement("option"); opt.value=""; opt.textContent="未发现摄像头"; el.cameraSelect.appendChild(opt); } } catch(err){ console.error(err); } }
      async function openCamera(){ try { if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; } const deviceId=el.cameraSelect.value; stream=await navigator.mediaDevices.getUserMedia({ video:deviceId ? {deviceId:{exact:deviceId}} : {facingMode:{ideal:"environment"}}, audio:false }); el.video.srcObject=stream; await el.video.play(); await sleep(300); resetState(true); el.startScanBtn.disabled=false; updateStatus("摄像头已打开，可以开始接收"); } catch(err){ console.error(err); updateStatus(`打开摄像头失败：${err.message||err}`); } }
      async function initDetector(){ if("BarcodeDetector" in window){ const formats=await BarcodeDetector.getSupportedFormats().catch(()=>[]); if(formats.includes("qr_code")){ detector=new BarcodeDetector({formats:["qr_code"]}); el.engineText.textContent="BarcodeDetector"; return; } } throw new Error("当前浏览器不支持原生 BarcodeDetector，请换用较新的 Chromium 浏览器。"); }
      function parseMeta(raw){ const parts=raw.split("|"); if(parts.length!==10) return null; try { return { type:"meta", id:parts[1], name:base64UrlToText(parts[2]), mime:base64UrlToText(parts[3]), originalSize:b36ToInt(parts[4]), payloadSize:b36ToInt(parts[5]), totalChunks:b36ToInt(parts[6]), chunkSize:b36ToInt(parts[7]), compression:parts[8]==="1"?"gzip":"none", fileCrc32:parts[9] }; } catch { return null; } }
      function parseChunkFast(raw){ const p1=raw.indexOf("|"), p2=raw.indexOf("|", p1+1), p3=raw.indexOf("|", p2+1); if(p1<0||p2<0||p3<0) return null; return { id:raw.slice(p1+1,p2), indexText:raw.slice(p2+1,p3), payloadText:raw.slice(p3+1) }; }
      function sameFingerprint(str){ const now=performance.now(); if(state.lastPacketFingerprint===str && now-state.lastScanAt<120) return true; state.lastPacketFingerprint=str; state.lastScanAt=now; return false; }
      function handleMeta(meta){ if(!state.session){ state.session={ id:meta.id, name:meta.name, mime:meta.mime||"application/octet-stream", originalSize:meta.originalSize, payloadSize:meta.payloadSize, totalChunks:meta.totalChunks, chunkSize:meta.chunkSize, compression:meta.compression, fileCrc32:meta.fileCrc32 }; state.chunks.clear(); el.transferId.textContent=meta.id; el.fileInfo.textContent=`${meta.name} · ${formatBytes(meta.originalSize)}` + (meta.payloadSize!==meta.originalSize ? ` · 载荷 ${formatBytes(meta.payloadSize)}` : ""); el.compressionInfo.textContent=meta.compression; el.integrityText.textContent="已锁定会话，等待分片"; updateStatus(`已锁定文件：${meta.name}`); updateProgressUI(true); return; } if(state.session.id===meta.id) return; }
      function handleChunkRaw(raw){ if(!state.session) return false; const fast=parseChunkFast(raw); if(!fast || fast.id!==state.session.id) return false; const index=b36ToInt(fast.indexText); if(!Number.isInteger(index) || index<0 || index>=state.session.totalChunks || state.chunks.has(index)) return false; let data; try { data=fromBase64Url(fast.payloadText); } catch { return false; } state.chunks.set(index,data); updateProgressUI(false); el.integrityText.textContent=`已接收 ${state.chunks.size}/${state.session.totalChunks}，收齐后做整文件校验`; return true; }
      function mergeChunks(){ const total=state.session.totalChunks; let totalSize=0; for(let i=0;i<total;i++){ const part=state.chunks.get(i); if(!part) throw new Error(`缺失分片 ${i}`); totalSize += part.length; } const merged=new Uint8Array(totalSize); let offset=0; for(let i=0;i<total;i++){ const part=state.chunks.get(i); merged.set(part, offset); offset += part.length; } return merged; }
      function downloadFile(bytes,name,mime){ const blob=new Blob([bytes], {type:mime||"application/octet-stream"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name||"download.bin"; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000); }
      async function finalizeIfComplete(){ if(!state.session || state.chunks.size!==state.session.totalChunks) return; try { updateStatus("已收齐全部分片，正在拼接..."); let payload=mergeChunks(), output=payload; if(state.session.compression==="gzip"){ updateStatus("正在解压..."); output=pako.ungzip(payload); } const finalCrc=crc32(output); if(finalCrc!==state.session.fileCrc32){ el.integrityText.textContent=`整体校验失败：期望 ${state.session.fileCrc32}，实际 ${finalCrc}`; updateStatus("整体校验失败，请继续扫描或让发送端调大帧间隔"); return; } el.integrityText.innerHTML=`<span class="ok">整体校验通过</span>`; updateStatus("接收完成，开始下载"); downloadFile(output, state.session.name, state.session.mime); stopScan(); updateStatus("接收完成，文件已下载"); } catch(err){ console.error(err); el.integrityText.textContent=`收尾失败：${err.message||err}`; updateStatus("收尾失败，请继续扫描或重新开始"); } }
      function drawCenterCrop(){ const vw=el.video.videoWidth||1280, vh=el.video.videoHeight||720, cropW=vw*CROP_RATIO, cropH=vh*CROP_RATIO, sx=(vw-cropW)/2, sy=(vh-cropH)/2; ctx.drawImage(el.video, sx, sy, cropW, cropH, 0, 0, SCAN_W, SCAN_H); }
      async function detectOneFrame(){ drawCenterCrop(); const codes=await detector.detect(canvas); if(!codes||!codes.length) return null; const raw=codes[0].rawValue; return (raw && typeof raw === "string") ? raw : null; }
      async function startScan(){ if(!stream || !detector || scanLoopActive) return; scanLoopActive=true; runId++; const myRunId=runId; el.startScanBtn.disabled=true; el.stopScanBtn.disabled=false; updateStatus("扫描中，请将二维码稳定置于画面中央"); while(scanLoopActive && myRunId===runId){ try { const raw=await detectOneFrame(); if(!raw){ await sleep(55); continue; } if(sameFingerprint(raw)){ await sleep(45); continue; } el.lastScanText.textContent=new Date().toLocaleTimeString(); const head=raw[0]; if(head==="M" && raw[1]==="|"){ const meta=parseMeta(raw); if(meta) handleMeta(meta); } else if(head==="C" && raw[1]==="|"){ const accepted=handleChunkRaw(raw); if(accepted){ updateStatus(`接收中：${state.session.name}`); await finalizeIfComplete(); } } await sleep(15); } catch(err){ console.error(err); updateStatus(`扫描异常：${err.message||err}`); await sleep(120); } } }
      function stopScan(){ scanLoopActive=false; el.stopScanBtn.disabled=true; el.startScanBtn.disabled=!stream; }
      el.openCameraBtn.addEventListener("click", async ()=>{ await openCamera(); await listCameras(); });
      el.startScanBtn.addEventListener("click", startScan); el.stopScanBtn.addEventListener("click", stopScan); el.resetBtn.addEventListener("click", ()=>{ stopScan(); resetState(!!stream); });
      el.cameraSelect.addEventListener("change", async ()=>{ if(stream){ stopScan(); await openCamera(); } });
      (async ()=>{ try { await initDetector(); } catch(err){ console.error(err); el.engineText.textContent="不可用"; updateStatus(err.message || String(err)); } if(navigator.mediaDevices?.addEventListener){ navigator.mediaDevices.addEventListener("devicechange", listCameras); } await listCameras(); })();
    })();
  </script>
</body>
</html>
